{% extends "layout.html" %}
{% block container %}

<div class="row">
    <div class="col-12">
        <h2>Estadísticas del Sistema</h2>
        <div class="row">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Total Alumnos</h5>
                        <p class="card-text display-4">{{ total_alumnos }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Total Maestros</h5>
                        <p class="card-text display-4">{{ total_maestros }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Total Cursos</h5>
                        <p class="card-text display-4">{{ total_cursos }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Total Inscripciones</h5>
                        <p class="card-text display-4">{{ total_inscripciones }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
