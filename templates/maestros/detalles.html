{% extends "layout.html" %}
{% block container %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h2>Detalles del Maestro</h2>
                <span class="badge bg-primary">Matrícula: {{ matricula }}</span>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h5>Nombre Completo</h5>
                        <p>{{ nombre }} {{ apellidos }}</p>
                    </div>
                    <div class="col-md-6">
                        <h5>Especialidad</h5>
                        <p>{{ especialidad }}</p>
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <h5>Correo Electrónico</h5>
                        <p>{{ email }}</p>
                    </div>
                </div>
            </div>
            <div class="card-footer text-center">
                <a href="{{ url_for('maestros.maestros_modificar', matricula=matricula) }}" class="btn btn-primary">Editar Registro</a>
                <a href="{{ url_for('maestros.maestros') }}" class="btn btn-secondary">Volver al Inicio</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
{% endblock %}
